name: RestAssured API Tests CI/CD

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      
      - name: Run Smoke Tests
        run: mvn clean test -Dsuite=smoke -Dtestng.suite=src/test/resources/testng-smoke.xml
      
      - name: Generate Allure Report
        if: always()
        run: |
          mvn allure:report
      
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-smoke
          path: target/allure-results
          retention-days: 30
      
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-smoke
          path: target/site/allure-maven-plugin
          retention-days: 30
      
      - name: Upload ExtentReports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-reports-smoke
          path: target/reports
          retention-days: 30
      
      - name: Upload Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-smoke
          path: target/logs
          retention-days: 7

  regression-tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: smoke-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      
      - name: Run Regression Tests
        run: mvn clean test -Dsuite=regression -Dtestng.suite=src/test/resources/testng-regression.xml
      
      - name: Generate Allure Report
        if: always()
        run: |
          mvn allure:report
      
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-regression
          path: target/allure-results
          retention-days: 30
      
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-regression
          path: target/site/allure-maven-plugin
          retention-days: 30
      
      - name: Upload ExtentReports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-reports-regression
          path: target/reports
          retention-days: 30
      
      - name: Upload Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-regression
          path: target/logs
          retention-days: 7

  publish-reports:
    name: Publish Test Reports
    runs-on: ubuntu-latest
    needs: [smoke-tests, regression-tests]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download Smoke Allure Results
        uses: actions/download-artifact@v3
        with:
          name: allure-results-smoke
          path: allure-results-smoke
      
      - name: Download Regression Allure Results
        uses: actions/download-artifact@v3
        with:
          name: allure-results-regression
          path: allure-results-regression
      
      - name: Merge Allure Results
        run: |
          mkdir -p allure-results
          cp -r allure-results-smoke/* allure-results/ || true
          cp -r allure-results-regression/* allure-results/ || true
      
      - name: Generate Combined Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20
      
      - name: Deploy Allure Report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
      
      - name: Comment PR with Test Results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const report_url = `https://${context.repo.owner}.github.io/${context.repo.repo}/${context.runNumber}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Test Results 📊\n\n✅ Smoke Tests: Completed\n✅ Regression Tests: Completed\n\n📈 [View Allure Report](${report_url})`
            });

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [smoke-tests, regression-tests]
    if: always()
    
    steps:
      - name: Check Test Results
        run: |
          echo "Smoke Tests: ${{ needs.smoke-tests.result }}"
          echo "Regression Tests: ${{ needs.regression-tests.result }}"
      
      - name: Send Success Notification
        if: needs.smoke-tests.result == 'success' && needs.regression-tests.result == 'success'
        run: |
          echo "✅ All tests passed successfully!"
      
      - name: Send Failure Notification
        if: needs.smoke-tests.result == 'failure' || needs.regression-tests.result == 'failure'
        run: |
          echo "❌ Some tests failed. Please check the reports."
          exit 1
